[package]
name = "crimssel1/dataservicetyped"
description = "Data handler and replication, now even better!"
version = "1.1.2"
license = "MIT"
authors = ["Leif Stout <leifstout@gmail.com>", "Terms", "Crimssel"]
repository = "https://github.com/crimssel1/dataServiceTyped"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

exclude = ["**"]
include = ["src", "src/*", "default.project.json", "wally.lock", "wally.toml", "LICENSE"]

[dependencies]
Signal = "sleitnick/signal@2.0.0"
Networker = "leifstout/networker@0.3.1"

[server-dependencies]
ProfileStore = "lm-loleris/profilestore@1.0.3"
